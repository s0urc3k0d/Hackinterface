<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41"/>
      <stop offset="100%" style="stop-color:#00cc33"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Terminal frame -->
  <rect x="60" y="80" width="392" height="352" rx="20" 
        fill="none" stroke="url(#accent)" stroke-width="4"/>
  
  <!-- Terminal header -->
  <rect x="60" y="80" width="392" height="45" rx="20" 
        fill="rgba(0,255,65,0.1)"/>
  <circle cx="95" cy="102" r="8" fill="#ff5f56"/>
  <circle cx="125" cy="102" r="8" fill="#ffbd2e"/>
  <circle cx="155" cy="102" r="8" fill="#27ca40"/>
  
  <!-- Terminal content - Hacking text -->
  <text x="90" y="175" font-family="Courier, monospace" font-size="22" fill="#00ff41">
    <tspan>$ ./hackinterface</tspan>
  </text>
  <text x="90" y="210" font-family="Courier, monospace" font-size="18" fill="#00ff41" opacity="0.7">
    <tspan>[*] Initializing...</tspan>
  </text>
  <text x="90" y="245" font-family="Courier, monospace" font-size="18" fill="#00ff41" opacity="0.7">
    <tspan>[+] Modules loaded</tspan>
  </text>
  <text x="90" y="280" font-family="Courier, monospace" font-size="18" fill="#00ff41" opacity="0.7">
    <tspan>[+] Ready for action</tspan>
  </text>
  
  <!-- Cursor blink -->
  <rect x="90" y="305" width="12" height="22" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Network lines decoration -->
  <g stroke="#00ff41" stroke-width="2" opacity="0.3">
    <line x1="350" y1="180" x2="420" y2="150"/>
    <line x1="350" y1="220" x2="400" y2="200"/>
    <line x1="350" y1="260" x2="410" y2="250"/>
    <circle cx="420" cy="150" r="4" fill="#00ff41"/>
    <circle cx="400" cy="200" r="4" fill="#00ff41"/>
    <circle cx="410" cy="250" r="4" fill="#00ff41"/>
  </g>
  
  <!-- Binary decoration -->
  <text x="360" y="350" font-family="Courier, monospace" font-size="12" fill="#00ff41" opacity="0.4">
    <tspan>01001000</tspan>
  </text>
  <text x="360" y="370" font-family="Courier, monospace" font-size="12" fill="#00ff41" opacity="0.4">
    <tspan>01100001</tspan>
  </text>
  <text x="360" y="390" font-family="Courier, monospace" font-size="12" fill="#00ff41" opacity="0.4">
    <tspan>01100011</tspan>
  </text>
</svg>
